<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jagdamb Laundry Admin Panel — Login" />
    <title>Admin Login | Jagdamb Laundry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
  </head>
  <body class="login-body">
    <div class="login-container">
      <div class="login-card">
        <div class="login-brand">
          <img src="../assets/jagdamblogo.png" alt="Jagdamb Laundry" class="login-logo" />
          <h1>Admin Panel</h1>
          <p>Jagdamb Laundry & Drycleaners</p>
        </div>
        <form id="loginForm" class="login-form" autocomplete="on">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="username" name="username" placeholder="Enter username" required autofocus />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="password" name="password" placeholder="Enter password" required />
              <button type="button" class="toggle-pass" id="togglePass" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div id="loginError" class="login-error" hidden></div>
          <button type="submit" class="btn-login" id="loginBtn">
            <span>Sign In</span>
            <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>
        <div class="login-footer">
          <a href="../index.html">← Back to Website</a>
        </div>
      </div>
      <div class="login-decoration">
        <div class="deco-circle c1"></div>
        <div class="deco-circle c2"></div>
        <div class="deco-circle c3"></div>
      </div>
    </div>

    <script>
      const API_BASE = (location.protocol === 'file:' || ((location.hostname === 'localhost' || location.hostname === '127.0.0.1') && location.port !== '3000'))
        ? 'http://localhost:3000'
        : '';

      // Check if already logged in
      const token = localStorage.getItem('jld_admin_token');
      if (token) {
        window.location.href = 'dashboard.html';
      }

      // Toggle password visibility (null-safe)
      const toggleBtn = document.getElementById('togglePass');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          const input = document.getElementById('password');
          input.type = input.type === 'password' ? 'text' : 'password';
        });
      }

      // Login form
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('loginError');
        errorEl.hidden = true;
        btn.disabled = true;
        btn.querySelector('span').textContent = 'Signing in...';

        try {
          const resp = await fetch(API_BASE + '/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: document.getElementById('username').value.trim(),
              password: document.getElementById('password').value
            })
          });
          const data = await resp.json();
          if (!resp.ok) {
            throw new Error(data.error || 'Login failed');
          }
          localStorage.setItem('jld_admin_token', data.token);
          localStorage.setItem('jld_admin_user', JSON.stringify(data.admin));
          window.location.href = 'dashboard.html';
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.hidden = false;
          btn.disabled = false;
          btn.querySelector('span').textContent = 'Sign In';
        }
      });

      // Register Admin PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(err => console.log('Admin ServiceWorker registration failed: ', err));
        });
      }
    </script>
  </body>
</html>
